<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        
        <!-- إضافة خط Cairo من جوجل -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        
        <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #f4f4f9;
        }
        #map {
            width: 100%;
            height: 100vh;
        }

        /* --- تحسين تصميم النوافذ المنبثقة (Popups) وجعلها في سطر واحد --- */
        .leaflet-popup-content-wrapper {
            border-radius: 12px !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2) !important;
            overflow: hidden;
        }
        .leaflet-popup-content {
            direction: rtl !important;
            text-align: right !important;
            font-family: 'Cairo', sans-serif;
            margin: 0 !important;
            width: auto !important;
            min-width: 250px;
        }
        .leaflet-popup-content table {
            width: 100%;
            border-collapse: collapse;
        }
        .leaflet-popup-content th, .leaflet-popup-content td {
            text-align: right !important;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            white-space: nowrap; /* هذه الخاصية تمنع انقسام النص إلى سطرين */
        }
        .leaflet-popup-content th {
            background-color: #f8f9fa;
            color: #34495e;
            font-weight: 600;
        }
        .leaflet-popup-content tr:last-child th, .leaflet-popup-content tr:last-child td {
            border-bottom: none;
        }
        .leaflet-popup-content tr:nth-child(even) {
            background-color: #fcfcfc;
        }
        .leaflet-popup-content a {
            color: #e74c3c !important;
            font-weight: bold;
            text-decoration: none;
            transition: color 0.3s;
        }
        .leaflet-popup-content a:hover {
            color: #c0392b !important;
        }
        
        /* تنسيق عبارة @ ROAD COMPASS في الأسفل */
        .leaflet-control-attribution {
            font-family: 'Cairo', sans-serif !important;
            font-weight: bold;
            color: #2c3e50 !important;
            background: rgba(255, 255, 255, 0.8) !important;
            padding: 2px 8px !important;
            border-radius: 4px !important;
        }
        </style>
        <title>نظام الخرائط العقارية</title>
    </head>
    <body>

        <div id="map"></div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/multi-style-layer.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="data/land21_1.js"></script>
        <script src="data/Joinedlayer_2.js"></script>
        <script src="data/NEW5_3.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: '#ffc107',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: '#ffeb3b',
                fillOpacity: 0.6,
                color: '#ff9800',
                weight: 3
              });
            }
            highlightLayer.openPopup();
        }

        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[34.421013132113025,35.82409372898375],[34.43149564107845,35.84714964958729]]);
        
        var hash = new L.Hash(map);
        
        // --- تعديل الحقوق في الأسفل لتكون كلمة واحدة فقط ---
        map.attributionControl.setPrefix('@ ROAD COMPASS');
        
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.update(); }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true; audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true; video.src = src;
                    video.style.width = "400px"; video.style.height = "300px";
                    video.style.maxHeight = "60vh"; video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() { popup.update(); });
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else { popup._contentNode.classList.remove('media'); }
            } else { popup._contentNode.classList.remove('media'); }
        }
        
        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters', secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters', secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        
        var bounds_group = new L.featureGroup([]);
        function setBounds() {}
        
        map.createPane('pane_GoogleHybrid_0');
        map.getPane('pane_GoogleHybrid_0').style.zIndex = 400;
        var layer_GoogleHybrid_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleHybrid_0', opacity: 1.0,
            attribution: '', // تم مسح الحقوق الخاصة بجوجل لكي تظهر العبارة المطلوبة فقط
            minZoom: 1, maxZoom: 28, minNativeZoom: 0, maxNativeZoom: 20
        });
        map.addLayer(layer_GoogleHybrid_0);
        
        function pop_land21_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') { layer.closePopup(); } else { layer.eachLayer(function(feature){ feature.closePopup() }); }
                },
                mouseover: highlightFeature,
            });
            var center = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
            var popupContent = '<table>\
                    <tr><th scope="row">رقم العقار :</th><td>' + (feature.properties['text'] !== null ? autolinker.link(String(feature.properties['text']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">المساحة التقريبية :</th><td>' + (feature.properties['land_surfa'] !== null ? autolinker.link(String(feature.properties['land_surfa']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">سعر المتر :</th><td>' + (feature.properties['land_price'] !== null ? autolinker.link(String(feature.properties['land_price']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">المنطقة :</th><td>' + (feature.properties['AKARIEH'] !== null ? autolinker.link(String(feature.properties['AKARIEH']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">الموقع :</th><td><a href="https://www.google.com/maps/search/?api=1&query=' + center.lat + ',' + center.lng + '" target="_blank"><i class="fas fa-map-marker-alt"></i> فتح في خرائط جوجل</a></td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        var pattern_land21_1_0 = new L.StripePattern({ weight: 0.3, spaceWeight: 2.0, color: '#f23232', opacity: 1.0, spaceOpacity: 0, angle: 315 });
        pattern_land21_1_0.addTo(map);
        function style_land21_1_0() { return { pane: 'pane_land21_1', stroke: false, fillOpacity: 1, fillPattern: pattern_land21_1_0, interactive: true, } }
        function style_land21_1_1() { return { pane: 'pane_land21_1', opacity: 1, color: 'rgba(242,50,50,1.0)', dashArray: '', lineCap: 'square', lineJoin: 'bevel', weight: 2.0, fillOpacity: 0, interactive: true, } }
        
        map.createPane('pane_land21_1');
        map.getPane('pane_land21_1').style.zIndex = 401;
        map.getPane('pane_land21_1').style['mix-blend-mode'] = 'normal';
        var layer_land21_1 = new L.geoJson.multiStyle(json_land21_1, {
            attribution: '', interactive: true, dataVar: 'json_land21_1', layerName: 'layer_land21_1', pane: 'pane_land21_1',
            onEachFeature: pop_land21_1, styles: [style_land21_1_0,style_land21_1_1,]
        });
        bounds_group.addLayer(layer_land21_1);
        map.addLayer(layer_land21_1);
        
        function pop_Joinedlayer_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) { if (typeof e.target._eventParents[i].resetStyle === 'function') { e.target._eventParents[i].resetStyle(e.target); } }
                    if (typeof layer.closePopup == 'function') { layer.closePopup(); } else { layer.eachLayer(function(feature){ feature.closePopup() }); }
                },
                mouseover: highlightFeature,
            });
            var center = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
            var popupContent = '<table>\
                    <tr><th scope="row">رقم العقار :</th><td>' + (feature.properties['text'] !== null ? autolinker.link(String(feature.properties['text']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">المساحة :</th><td>' + (feature.properties['area'] !== null ? autolinker.link(String(feature.properties['area']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">التصنيف (Zone) :</th><td>' + (feature.properties['zone'] !== null ? autolinker.link(String(feature.properties['zone']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">المنطقة :</th><td>' + (feature.properties['MNTA2A'] !== null ? autolinker.link(String(feature.properties['MNTA2A']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">الموقع :</th><td><a href="https://www.google.com/maps/search/?api=1&query=' + center.lat + ',' + center.lng + '" target="_blank"><i class="fas fa-map-marker-alt"></i> فتح في خرائط جوجل</a></td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        var pattern_Joinedlayer_2_0 = new L.StripePattern({ weight: 0.3, spaceWeight: 2.0, color: '#f8ed12', opacity: 1.0, spaceOpacity: 0, angle: 315 });
        pattern_Joinedlayer_2_0.addTo(map);
        function style_Joinedlayer_2_0() { return { pane: 'pane_Joinedlayer_2', stroke: false, fillOpacity: 1, fillPattern: pattern_Joinedlayer_2_0, interactive: true, } }
        function style_Joinedlayer_2_1() { return { pane: 'pane_Joinedlayer_2', opacity: 1, color: 'rgba(248,237,18,1.0)', dashArray: '', lineCap: 'square', lineJoin: 'bevel', weight: 2.0, fillOpacity: 0, interactive: true, } }
        
        map.createPane('pane_Joinedlayer_2');
        map.getPane('pane_Joinedlayer_2').style.zIndex = 402;
        map.getPane('pane_Joinedlayer_2').style['mix-blend-mode'] = 'normal';
        var layer_Joinedlayer_2 = new L.geoJson.multiStyle(json_Joinedlayer_2, {
            attribution: '', interactive: true, dataVar: 'json_Joinedlayer_2', layerName: 'layer_Joinedlayer_2', pane: 'pane_Joinedlayer_2',
            onEachFeature: pop_Joinedlayer_2, styles: [style_Joinedlayer_2_0,style_Joinedlayer_2_1,]
        });
        bounds_group.addLayer(layer_Joinedlayer_2);
        map.addLayer(layer_Joinedlayer_2);
        
        function pop_NEW5_3(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) { if (typeof e.target._eventParents[i].resetStyle === 'function') { e.target._eventParents[i].resetStyle(e.target); } }
                    if (typeof layer.closePopup == 'function') { layer.closePopup(); } else { layer.eachLayer(function(feature){ feature.closePopup() }); }
                },
                mouseover: highlightFeature,
            });
            var center = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
            var popupContent = '<table>\
                    <tr><th scope="row">رقم العقار :</th><td>' + (feature.properties['text'] !== null ? autolinker.link(String(feature.properties['text']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">مساحة العقار :</th><td>' + (feature.properties['landCSV_su'] !== null ? autolinker.link(String(feature.properties['landCSV_su']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">التصنيف (Zone) :</th><td>' + (feature.properties['landCSV_zo'] !== null ? autolinker.link(String(feature.properties['landCSV_zo']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">المنطقة :</th><td>' + (feature.properties['AKARIEH'] !== null ? autolinker.link(String(feature.properties['AKARIEH']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">الموقع :</th><td><a href="https://www.google.com/maps/search/?api=1&query=' + center.lat + ',' + center.lng + '" target="_blank"><i class="fas fa-map-marker-alt"></i> فتح في خرائط جوجل</a></td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        var pattern_NEW5_3_0 = new L.StripePattern({ weight: 0.3, spaceWeight: 2.0, color: '#e4da0b', opacity: 1.0, spaceOpacity: 0, angle: 315 });
        pattern_NEW5_3_0.addTo(map);
        function style_NEW5_3_0() { return { pane: 'pane_NEW5_3', stroke: false, fillOpacity: 1, fillPattern: pattern_NEW5_3_0, interactive: true, } }
        function style_NEW5_3_1() { return { pane: 'pane_NEW5_3', opacity: 1, color: 'rgba(228,218,11,1.0)', dashArray: '', lineCap: 'square', lineJoin: 'bevel', weight: 2.0, fillOpacity: 0, interactive: true, } }
        
        map.createPane('pane_NEW5_3');
        map.getPane('pane_NEW5_3').style.zIndex = 403;
        map.getPane('pane_NEW5_3').style['mix-blend-mode'] = 'normal';
        var layer_NEW5_3 = new L.geoJson.multiStyle(json_NEW5_3, {
            attribution: '', interactive: true, dataVar: 'json_NEW5_3', layerName: 'layer_NEW5_3', pane: 'pane_NEW5_3',
            onEachFeature: pop_NEW5_3, styles: [style_NEW5_3_0,style_NEW5_3_1,]
        });
        bounds_group.addLayer(layer_NEW5_3);
        map.addLayer(layer_NEW5_3);
        setBounds();

        </script>        
    </body>
</html>
